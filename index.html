<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Interactive guide to the best US National Parks to visit by month. Filter by month to find ideal travel times, weather, airports, and more." />
  <title>Explore US National Parks by Month</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>
  <div class="bg-glow bg-glow-3"></div>

  <header>
    <h1>🏞️ US National Parks</h1>
    <p class="subtitle">Discover the best time to visit every park</p>
  </header>

  <nav id="month-bar" aria-label="Month filter">
    <div class="month-chips"></div>
    <div class="visited-toggle-wrap">
      <label class="toggle-label" for="visited-toggle">
        <input type="checkbox" id="visited-toggle" checked />
        <span class="toggle-track">
          <span class="toggle-knob"></span>
        </span>
        Show Visited Parks
      </label>
    </div>
  </nav>

  <main>
    <div id="stats-bar" class="stats-bar"></div>
    <div id="filter-panel" class="filter-panel hidden"></div>
    <div id="park-grid" class="park-grid"></div>
    <div id="empty-state" class="empty-state hidden">
      <span class="empty-icon">🗺️</span>
      <p>Select a month above to explore parks</p>
    </div>
  </main>

  <footer>
    <p>Data is approximate — always check <a href="https://recreation.gov" target="_blank">recreation.gov</a> for permits & reservations</p>
  </footer>

  <!-- Modal -->
  <div id="park-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <button class="modal-close" id="modal-close-btn">&times;</button>
      <div class="modal-body" id="modal-body">
        <!-- Content injected here -->
      </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
