<body>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>
  <div class="bg-glow bg-glow-3"></div>

  <header>
    <div class="header-main-row">
      <h1>US National Park Finder</h1>
      <div class="header-actions">
        <button id="share-btn" class="header-btn" title="Share App" aria-label="Share App">🔗 Share</button>
        <div class="theme-switch" role="group" aria-label="Theme switcher">
          <button id="theme-light" class="theme-btn" title="Light Mode" aria-label="Switch to light mode">🌞</button>
          <button id="theme-dark" class="theme-btn" title="Dark Mode" aria-label="Switch to dark mode">🌙</button>
        </div>
      </div>
    </div>
    <p class="subtitle">Discover the perfect national park for your next trip</p>
  </header>

  <div class="search-container">
    <div class="start-point-wrapper">
      <span class="start-point-label">From</span>
      <select id="start-point" class="start-point-select" aria-label="Select starting point">
        <option value="SFO">SFO</option>
      </select>
    </div>
    <div class="search-input-wrapper">
      <input type="text" id="park-search" class="search-input" placeholder="🔍 Search parks by name or state..." aria-label="Search parks" />
      <button id="search-clear" class="search-clear" aria-label="Clear search">×</button>
    </div>
  </div>

  <nav id="month-bar" aria-label="Month filter">
    <div class="month-chips"></div>
  </nav>

  <main>
    <div id="stats-bar" class="stats-bar"></div>
    <div id="active-filters" class="active-filters"></div>
    <div id="filter-panel" class="filter-panel hidden"></div>
    <div id="park-grid" class="park-grid"></div>
    <div id="empty-state" class="empty-state hidden">
      <span class="empty-icon">🗺️</span>
      <p>Select a month above to explore parks</p>
    </div>
  </main>

  <footer>
    <p>Data is approximate — always check <a href="https://recreation.gov" target="_blank">recreation.gov</a> for permits & reservations</p>
  </footer>

  <!-- Modal -->
  <div id="park-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <button class="modal-close" id="modal-close-btn">&times;</button>
      <div class="modal-body" id="modal-body">
        <!-- Content injected here -->
      </div>
    </div>
  </div>

  <script src="data/data-hubs.js"></script>
  <script src="data/parks-summary.js"></script>
  <script src="data/parks-seasonal.js"></script>
  <script src="data/parks-details.js"></script>
  <script src="data/parks-logistics.js"></script>
  <script src="app.js"></script>
</body>
</html>
